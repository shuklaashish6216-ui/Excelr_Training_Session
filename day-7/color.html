<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            background-color: 1px solid #000000;
            background-color: 1px solid hsl(0, 73%, 54%);
            background-color: 1px solid rgb(255, 255, 255);
            background-color: rgb(255, 0, 0,0.2 );
        }

        /*  color names 
                - rgb (red ,green , blue) 
                - rgba( red , green , blue , alpha)  -- (fully transparent )0 
                                                    -- (not transparent) 1
                - hex (hexadecimal) -- #rrggbb
                - hsl (hue , saturation , lightness)
        */
    </style>
</head>
<body>
    <div></div>
</body>
</html>
