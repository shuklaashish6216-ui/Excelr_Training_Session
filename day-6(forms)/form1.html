<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form </title>
</head>
<body>
    <!-- <form action="https://httpbin.org/post" method="post"> -->
    <form action="" method="get">
        <label for="age">Age</label>
      <input type="number"  name="age" id="age" placeholder="enter age">
      <label for="name">Name</label>
      <input type="text" name="name" id="name " placeholder="enter you name">
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
    
</body>
</html>

<!-- 


action :  where the data is sent( backend) 
method: how data is sent to backend 
         1.get ----- we can display the data in the format of key and value pair 
         2.post --- we can hide the data in url 
name : it is used to specify keyName



http://127.0.0.1:5500/day-6(forms)/form1.html


http://127.0.0.1:5500/day-6(forms)/form1.html?age=21&name=Ashish+Shukla+
url/action?k1=v&k2=v2 ------- query String /Query parameters   ---   get
url/action -------------- method  - post



-->
