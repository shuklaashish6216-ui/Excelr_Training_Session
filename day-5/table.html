<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        /* table,th,td{
            border: 1px solid black;
            border-collapse: collapse;
        } */
        table{
            width: 400px;
            height: 40px;
        }
    </style>
</head>
<body>
    <table border="1" cellpadding="10" cellspacing="10" >
        <!-- <table> -->
        <thead >
            <tr>
                <th>SLNO</th>
                <th>NAME</th>
                <th>PHONE</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Ashish</td>
                <td>9345678945</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Abhishek</td>
                <td>9876543210</td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>

<!-- 
table -- for table structure
thead -- for table head
tbody -- for table data/body
tr -- for table row
th -- for table header cell(bold&centered)
td -- for table data(normal cell)
cellspacing -- space between cel to cell
cellpadding -- space between cell content and border

-->
