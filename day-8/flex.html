<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 1</title>
    <style>
        .parent{
            border: 1px solid black;
            height: 600px;
            display: flex;
            flex-direction: column-reverse;
            justify-content: center;
            align-items: flex-end;

            /* flex-direction: row-reverse;
                             : column-reverse;
                             : row ;
                             : column;
             */
             /* gap: 30px; */
             /* justify-content: center; */
             /* align-items: center; */
        

        }
        .item{
            height: 100px;
            width: 100px;
            border: 1px solid black;
            font-size: 50px;

        }
        .one{
            background-color: red;
        }
        .two{
            background-color: yellow;
        }
        .three{
            background-color: pink;
        }
        .four{
            background-color: blue;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="item one">1</div>
        <div class="item two ">2</div>
        <div class="item three">3</div>
        <div class="item four">4</div>
    </div>

    
</body>
</html>

<!--  flex model  is one dimensional layout (row /column)
    flex container -- parent
    flex items -- child 

    parent --- display : flex ;
               display- direction : row ;
               change direction : flex -direction ;

               Main Axis : direction of flex items(row/column)  -- justify content 
               Cross Axis : perpendicular to main         --- align items

    direction : row
         main Axis - X axis 
         cross Axix - Y axis

    direction : column 
      main axis - Y axis
      cross axis - X axis
    -->
